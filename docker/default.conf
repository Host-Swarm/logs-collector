server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html index.htm;

    # Increase buffer sizes to handle large headers
    fastcgi_buffer_size 32k;
    fastcgi_buffers 8 32k;
    fastcgi_busy_buffers_size 32k;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Streaming endpoints: logs, exec — disable all buffering and use long timeouts.
    location ~ ^/api/containers/ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Disable buffering so chunks are forwarded immediately.
        fastcgi_buffering off;
        fastcgi_request_buffering off;

        # Long timeouts for persistent streaming connections (6 hours).
        fastcgi_read_timeout 21600;
        fastcgi_send_timeout 21600;

        # Ensure chunked transfer works end-to-end.
        chunked_transfer_encoding on;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;

        # Override fastcgi buffer settings for PHP requests
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
        fastcgi_busy_buffers_size 32k;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
