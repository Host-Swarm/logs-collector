version: "3.9"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: host-swarm-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_NAME: host-swarm-agent
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_LEVEL: info

      # Shared secret for GET /api/stacks and GET /api/stacks/{stack}
      SERVER_SECRET: "${SERVER_SECRET}"

      # Parent server-manager app for Passport token validation
      PARENT_APP_URL: "${PARENT_APP_URL:-http://server-manager}"
      PARENT_APP_TOKEN_VERIFY_PATH: /api/token/verify
      PARENT_APP_TIMEOUT: 5

      # Swarm
      LOG_COLLECTOR_SWARM_KEY: "${LOG_COLLECTOR_SWARM_KEY:-main-swarm}"

      # Docker socket
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      DOCKER_TIMEOUT: 10
      DOCKER_CONNECT_TIMEOUT: 5
      DOCKER_STREAM_TIMEOUT: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - server_manager

networks:
  server_manager:
    driver: bridge
