version: "3.9"

services:
  logs-collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: host-swarm-logs-collector
    restart: unless-stopped
    environment:
      APP_NAME: host-swarm-logs-collector
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: single
      LOG_LEVEL: debug

      LOG_COLLECTOR_SWARM_KEY: main-swarm

      DOCKER_SOCKET_PATH: /var/run/docker.sock
      DOCKER_BASE_URL: http://localhost
      DOCKER_TIMEOUT: 10
      DOCKER_CONNECT_TIMEOUT: 5
      DOCKER_STREAM_TIMEOUT: 0

      PUSHER_APP_ID: app-id
      PUSHER_APP_KEY: app-key
      PUSHER_APP_SECRET: app-secret
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      PUSHER_APP_CLUSTER: mt1
      PUSHER_SOCKET_PATH: /ws/swarm
      UPSTREAM_SOCKET_TIMEOUT: 10
      UPSTREAM_SOCKET_CONNECT_TIMEOUT: 5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/var/www/html
    networks:
      - server_manager

networks:
  server_manager:
    driver: bridge